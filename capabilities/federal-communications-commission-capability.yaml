naftiko: 1.0.0-alpha2
info:
  label: FCC ECFS API
  description: The FCC Electronic Comment Filing System (ECFS) public API provides programmatic access to filings, proceedings,
    and submissions made to the Federal Communications Commission.
  tags:
  - Federal
  - Communications
  - Commission
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: federal-communications-commission
    baseUri: https://publicapi.fcc.gov/ecfs
    description: FCC ECFS API HTTP API.
    authentication:
      type: apikey
      in: query
      name: api_key
      value: '{{FEDERAL_COMMUNICATIONS_COMMISSION_TOKEN}}'
    resources:
    - name: filings
      path: /filings
      operations:
      - name: listfilings
        method: GET
        description: Search ECFS filings
        inputParameters:
        - name: api_key
          in: query
          type: string
          required: true
          description: api.data.gov API key.
        - name: limit
          in: query
          type: integer
        - name: offset
          in: query
          type: integer
        - name: proceedings.name
          in: query
          type: string
          description: Proceeding (docket) number filter.
        - name: sort
          in: query
          type: string
          description: Field name and direction (e.g. date_disseminated,DESC).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: proceedings
      path: /proceedings
      operations:
      - name: listproceedings
        method: GET
        description: Search ECFS proceedings
        inputParameters:
        - name: api_key
          in: query
          type: string
          required: true
        - name: limit
          in: query
          type: integer
        - name: offset
          in: query
          type: integer
        - name: name
          in: query
          type: string
          description: Proceeding (docket) number filter.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: federal-communications-commission-rest
    description: REST adapter for FCC ECFS API.
    resources:
    - path: /filings
      name: listfilings
      operations:
      - method: GET
        name: listfilings
        description: Search ECFS filings
        call: federal-communications-commission.listfilings
        outputParameters:
        - type: object
          mapping: $.
    - path: /proceedings
      name: listproceedings
      operations:
      - method: GET
        name: listproceedings
        description: Search ECFS proceedings
        call: federal-communications-commission.listproceedings
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: federal-communications-commission-mcp
    transport: http
    description: MCP adapter for FCC ECFS API for AI agent use.
    tools:
    - name: listfilings
      description: Search ECFS filings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: federal-communications-commission.listfilings
      with:
        api_key: tools.api_key
        limit: tools.limit
        offset: tools.offset
        proceedings.name: tools.proceedings.name
        sort: tools.sort
      inputParameters:
      - name: api_key
        type: string
        description: api.data.gov API key.
        required: true
      - name: limit
        type: integer
        description: limit
      - name: offset
        type: integer
        description: offset
      - name: proceedings.name
        type: string
        description: Proceeding (docket) number filter.
      - name: sort
        type: string
        description: Field name and direction (e.g. date_disseminated,DESC).
      outputParameters:
      - type: object
        mapping: $.
    - name: listproceedings
      description: Search ECFS proceedings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: federal-communications-commission.listproceedings
      with:
        api_key: tools.api_key
        limit: tools.limit
        offset: tools.offset
        name: tools.name
      inputParameters:
      - name: api_key
        type: string
        description: api_key
        required: true
      - name: limit
        type: integer
        description: limit
      - name: offset
        type: integer
        description: offset
      - name: name
        type: string
        description: Proceeding (docket) number filter.
      outputParameters:
      - type: object
        mapping: $.
binds:
- namespace: env
  keys:
    FEDERAL_COMMUNICATIONS_COMMISSION_TOKEN: FEDERAL_COMMUNICATIONS_COMMISSION_TOKEN
