aid: federal-communications-commission
name: Federal Communications Commission
description: >-
  The Federal Communications Commission (FCC) regulates interstate and
  international communications by radio, television, wire, satellite, and cable
  in the United States. The FCC exposes public APIs including the Electronic
  Comment Filing System (ECFS) and the FCC Open Data portal.
